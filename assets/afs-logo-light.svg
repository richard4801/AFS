<?xml version="1.0" encoding="UTF-8"?>
<!-- Light variant (dark text on cream/white background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&amp;family=Montserrat:wght@400&amp;display=swap');
            .text-serif-dark { font-family: 'Cinzel', serif; font-weight: 700; fill: #111215; font-size: 38px; letter-spacing: 4px; }
            .text-sans-dark { font-family: 'Montserrat', sans-serif; font-weight: 400; fill: #4a4a4a; letter-spacing: 5px; font-size: 9px; text-transform: uppercase; }
        </style>
    </defs>
    <g transform="translate(20, 15)">
        <text class="text-serif-dark" x="0" y="35">AFS</text>
        <line x1="-2" y1="28" x2="95" y2="28" stroke="#ffffff" stroke-width="2" />
        <text class="text-sans-dark" x="2" y="52">Publishing</text>
    </g>
</svg>
