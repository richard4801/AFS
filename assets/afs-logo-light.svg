<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" role="img" aria-label="AFS Publishing">

  <!-- Light variant: cream background, dark ink -->
  <rect width="280" height="130" fill="#EEECE9"/>

  <g stroke="#1B1917" stroke-width="7" fill="none" stroke-linecap="butt" stroke-linejoin="miter">

    <!-- ─── A ─────────────────────────────────────────────
         Apex  (81, 14)
         Feet  (57, 84)  (105, 84)
         Crossbar at y=53 → intersect left leg ≈ x 65, right leg ≈ x 97  -->
    <polyline points="57,84 81,14 105,84"/>
    <line x1="65" y1="53" x2="97" y2="53"/>

    <!-- ─── F ─────────────────────────────────────────────
         Stem x=123, cap-height 14→84
         Top bar  full width  → 159
         Mid bar  75 % width  → 150, at y=49                 -->
    <line x1="123" y1="14" x2="123" y2="84"/>
    <line x1="123" y1="14" x2="159" y2="14"/>
    <line x1="123" y1="49" x2="150" y2="49"/>

    <!-- ─── S ─────────────────────────────────────────────
         Bounding box x 177–223, y 13–85
         Open cubic-bezier path; round terminals for clean finish -->
    <path stroke-linecap="round"
          d="M 219,21
             C 222,13 215,13 202,13
             C 183,13 177,24 177,34
             C 177,43 186,47 200,49
             C 214,51 223,57 223,67
             C 223,77 215,85 201,85
             C 186,85 177,76 177,67"/>
  </g>

  <!-- Rule: spans the full AFS group width -->
  <line x1="57" y1="97" x2="223" y2="97"
        stroke="#1B1917" stroke-width="0.8"/>

  <!-- "PUBLISHING" – small, ultra-tracked, force-fit to AFS width -->
  <text x="140" y="115"
        text-anchor="middle"
        font-family="'Futura', 'Century Gothic', 'Trebuchet MS', Arial, sans-serif"
        font-size="7.5"
        fill="#1B1917"
        textLength="166"
        lengthAdjust="spacing">PUBLISHING</text>

</svg>
