<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded-square tile -->
  <rect width="64" height="64" rx="10" fill="#111110"/>
  <!-- A letterform + unified horizontal slash -->
  <g stroke="#EEECE9" stroke-width="4.5" fill="none" stroke-linecap="butt" stroke-linejoin="miter">
    <!-- A: apex (32,8) feet (8,56)(56,56) -->
    <polyline points="8,56 32,8 56,56"/>
    <!-- Slash at exact mid-height y=32, edge-to-edge -->
    <line x1="8" y1="32" x2="56" y2="32"/>
  </g>
</svg>
