<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AFS">
  <!-- Dark rounded-square tile, matching the app's obsidian surface -->
  <rect width="64" height="64" rx="10" fill="#111110"/>
  <!-- The real AFS wordmark's own letterform (Cinzel) and clip-path gap
       technique, just the first letter, not a separately-drawn shape. -->
  <g style="clip-path:path('M0 0 H64 V27 H0 Z M0 33 H64 V64 H0 Z')">
    <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
          font-family="'Cinzel',Georgia,serif" font-weight="400" font-size="46"
          fill="#EEECE9">A</text>
  </g>
</svg>
