<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 480 180" width="480" height="180"
     role="img" aria-label="AFS Publishing">
  <title>AFS Publishing — transparent, dark text</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&amp;family=Montserrat:wght@400&amp;display=swap');
    </style>
    <clipPath id="logo-gap">
      <rect x="0" y="0"         width="480" height="109"/>
      <rect x="0" y="116"       width="480" height="64"/>
    </clipPath>
  </defs>
  <g clip-path="url(#logo-gap)">
    <text x="52" y="140"
          font-family="'Cinzel', Georgia, serif"
          font-weight="400" font-size="120" letter-spacing="4"
          fill="#2A2724">AFS</text>
    <text x="54" y="163"
          font-family="'Montserrat', 'Trebuchet MS', sans-serif"
          font-weight="400" font-size="13" letter-spacing="5"
          fill="rgba(42,39,36,0.42)">Publishing</text>
  </g>
</svg>