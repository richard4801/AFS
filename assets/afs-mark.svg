<?xml version="1.0" encoding="UTF-8"?>
<!--
  AFS compact mark — for nav bars, favicons, small UI use.
  Cropped viewBox shows only the letterforms + slash; no background.
  Cream ink: use on dark surfaces.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 8 180 84" role="img" aria-label="AFS">

  <g stroke="#EEECE9" stroke-width="7" fill="none" stroke-linecap="butt" stroke-linejoin="miter">

    <!-- A -->
    <polyline points="57,84 81,14 105,84"/>

    <!-- F: stem + top bar -->
    <line x1="123" y1="14" x2="123" y2="84"/>
    <line x1="123" y1="14" x2="159" y2="14"/>

    <!-- S -->
    <path stroke-linecap="round"
          d="M 219,21
             C 222,13 215,13 202,13
             C 183,13 177,24 177,34
             C 177,43 186,47 200,49
             C 214,51 223,57 223,67
             C 223,77 215,85 201,85
             C 186,85 177,76 177,67"/>

    <!-- Unified slash -->
    <line x1="57" y1="49" x2="223" y2="49"/>
  </g>

</svg>
