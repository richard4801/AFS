<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="../assets/afs-favicon.svg"/>
  <title>Admin Access — Apex Fiction Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian:        '#0D0D0D',
            charcoal:        '#161616',
            surface:         '#1E1E1E',
            border:          '#2A2A2A',
            crimson:         '#A31621',
            'crimson-light': '#C82333',
            'crimson-dim':   '#7A1019',
            gold:            '#C9A84C',
            muted:           '#6A6A6A',
          },
          fontFamily: {
            sans:  ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400&display=swap" rel="stylesheet"/>
  <style>
    .form-input:focus {
      outline: none;
      border-color: #A31621;
      box-shadow: 0 0 0 2px rgba(163,22,33,0.18);
    }
    .digit-box { width:38px; height:46px; text-align:center; font-size:1.15rem; font-weight:700; background:#161616; border:1px solid #2A2A2A; border-radius:8px; color:#fff; transition:border-color .15s, box-shadow .15s; caret-color:#A31621; -moz-appearance:textfield; }
    @media (min-width: 400px) { .digit-box { width:42px; height:50px; font-size:1.25rem; } }
    .digit-box::-webkit-outer-spin-button, .digit-box::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .digit-box:focus { outline:none; border-color:#A31621; box-shadow:0 0 0 2px rgba(163,22,33,0.18); }
    .digit-box.filled { border-color:rgba(163,22,33,0.35); }
    #verify-step { display:none; }

    /* Subtle scanline texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }
  </style>
</head>

<body class="bg-obsidian text-white font-sans antialiased min-h-screen flex items-center justify-center px-4">

  <!-- Crimson radial glow (cursor-tracked) -->
  <div id="afs-glow"
       class="pointer-events-none fixed inset-0"
       style="z-index:0; will-change:background;"></div>

  <!-- Faint grid revealed by cursor (crimson tint) -->
  <div id="afs-grid"
       class="pointer-events-none fixed inset-0"
       style="
         z-index: 0;
         background-image:
           linear-gradient(rgba(163,22,33,0.18) 1px, transparent 1px),
           linear-gradient(90deg, rgba(163,22,33,0.18) 1px, transparent 1px);
         background-size: 48px 48px;
         -webkit-mask-image: radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         mask-image:         radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         will-change: mask-image, -webkit-mask-image;
       "></div>

  <div class="relative z-10 w-full max-w-sm mx-auto">

    <!-- Logo + wordmark -->
    <div class="flex flex-col items-center justify-center gap-2 mb-10">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="15 18 110 52" height="54" aria-label="AFS Publishing">
        <defs><clipPath id="afsc"><rect x="0" y="0" width="400" height="43"/><rect x="0" y="47" width="400" height="200"/></clipPath></defs><g transform="translate(20,15)" clip-path="url(#afsc)">
          <text font-family="'Cinzel',Georgia,serif" font-weight="400" fill="#EEECE9" font-size="38" letter-spacing="4" x="0" y="35">AFS</text>
          
          <text font-family="'Montserrat',system-ui,sans-serif" font-weight="400" fill="rgba(238,236,233,0.42)" font-size="9" letter-spacing="5" x="2" y="52">Publishing</text>
        </g>
      </svg>
      <span class="text-[10px] font-semibold tracking-[0.22em] uppercase text-crimson-light">Admin Portal</span>
    </div>

    <!-- Card -->
    <div class="relative rounded-2xl border border-border bg-surface p-6 sm:p-8 shadow-2xl shadow-black/80">

      <!-- Top accent — crimson instead of gold -->
      <div class="absolute top-0 left-8 right-8 h-px bg-gradient-to-r from-transparent via-crimson/60 to-transparent rounded-full"></div>

      <!-- Lock icon -->
      <div class="flex justify-center mb-5">
        <div class="w-10 h-10 rounded-xl bg-crimson/10 border border-crimson/25 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="#A31621" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <h1 class="font-serif text-2xl text-white mb-1 text-center">Admin Access</h1>
      <p class="text-muted text-sm mb-8 text-center">Restricted to authorised personnel only.</p>

      <form id="login-form" class="space-y-5" novalidate>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="email">
            Email Address
          </label>
          <input
            id="email" type="email" autocomplete="email" required
            placeholder="admin@apexfiction.com"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="password">
            Password
          </label>
          <input
            id="password" type="password" autocomplete="current-password" required
            placeholder="••••••••"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <!-- Error / access denied -->
        <div id="error-msg"
             class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5
                       bg-crimson hover:bg-crimson-light text-white
                       text-sm font-semibold rounded-lg
                       transition-colors duration-200
                       disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-label">Access Dashboard</span>
          <svg id="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>

      <!-- DEVICE VERIFICATION STEP -->
      <div id="verify-step">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-crimson/10 border border-crimson/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A31621" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
        </div>

        <h2 class="font-serif text-2xl text-white mb-1 text-center">Verify your device</h2>
        <p class="text-muted text-sm text-center mb-1">We sent a 6-digit code to</p>
        <p id="verify-email-display" class="text-white text-sm font-semibold text-center mb-6 truncate px-2"></p>

        <div id="digit-row" class="flex gap-2 justify-center mb-5">
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
        </div>

        <div id="verify-error" class="hidden mb-4 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed"></div>

        <button id="verify-btn" onclick="submitVerification()"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-crimson hover:bg-crimson-light text-white text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="verify-btn-label">Verify Device</span>
          <svg id="verify-btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg id="verify-btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
        </button>

        <div class="mt-4 flex items-center justify-between">
          <button id="resend-btn" onclick="resendCode()" class="text-xs text-muted hover:text-crimson-light transition-colors">Resend code</button>
          <button onclick="backToLogin()" class="text-xs text-muted hover:text-white transition-colors">Different account</button>
        </div>
      </div>
    </div>

    <!-- Back link -->
    <p class="text-center text-muted text-xs mt-6">
      Not an admin?
      <a href="login.html" class="text-white/50 hover:text-white transition-colors duration-150">
        Writer sign in →
      </a>
    </p>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://qbqsbdswcqmrxoizgfrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_v0fbhx8NkRNxYYVw8VGz_g_7Eqja11K';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, storage: window.localStorage },
    });

    const TRUST_PREFIX = 'afs_dev_';
    const TRUST_MS     = 30 * 24 * 60 * 60 * 1000;

    async function getDeviceTrust(userId) {
      try {
        const stored = JSON.parse(localStorage.getItem(TRUST_PREFIX + userId) || 'null');
        if (!stored?.token) return false;
        const { data } = await db.from('device_tokens')
          .select('id')
          .eq('user_id', userId)
          .eq('token', stored.token)
          .gte('expires_at', new Date().toISOString())
          .maybeSingle();
        return !!data;
      } catch { return false; }
    }

    async function setDeviceTrust(userId) {
      try {
        const arr   = crypto.getRandomValues(new Uint8Array(32));
        const token = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
        const expiresAt = new Date(Date.now() + TRUST_MS).toISOString();
        await db.from('device_tokens').delete()
          .eq('user_id', userId).lt('expires_at', new Date().toISOString());
        await db.from('device_tokens').insert({ user_id: userId, token, expires_at: expiresAt });
        localStorage.setItem(TRUST_PREFIX + userId, JSON.stringify({ token }));
      } catch { /* non-fatal */ }
    }

    const form    = document.getElementById('login-form');
    const errBox  = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');
    const label   = document.getElementById('btn-label');
    const arrow   = document.getElementById('btn-arrow');
    const spinner = document.getElementById('btn-spinner');

    let _pendingEmail  = '';
    let _pendingUserId = '';

    function setLoading(on) {
      btn.disabled = on;
      label.textContent = on ? 'Verifying…' : 'Access Dashboard';
      arrow.classList.toggle('hidden', on);
      spinner.classList.toggle('hidden', !on);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errBox.textContent = error.message;
        errBox.classList.remove('hidden');
        setLoading(false);
        return;
      }

      const userId = data.user?.id;

      // Verify admin status
      const { data: profile } = await db.from('profiles').select('is_admin').eq('id', userId).single();
      if (!profile?.is_admin) {
        await db.auth.signOut();
        errBox.textContent = 'Access denied. This portal is for admins only.';
        errBox.classList.remove('hidden');
        setLoading(false);
        return;
      }

      // Trusted device? Go straight to dashboard
      if (await getDeviceTrust(userId)) {
        window.location.replace('admin.html');
        return;
      }

      // Untrusted device — send OTP
      _pendingEmail  = email;
      _pendingUserId = userId;

      await db.auth.signOut();

      const { error: otpErr } = await db.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false },
      });

      setLoading(false);

      if (otpErr) {
        errBox.textContent = 'Could not send verification code: ' + otpErr.message;
        errBox.classList.remove('hidden');
        return;
      }

      showVerifyStep();
    });

    function showVerifyStep() {
      document.getElementById('login-form').style.display = 'none';
      const step = document.getElementById('verify-step');
      step.style.display = 'block';
      document.getElementById('verify-email-display').textContent = _pendingEmail;
      document.getElementById('verify-error').classList.add('hidden');
      const boxes = document.querySelectorAll('.digit-box');
      boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
      setTimeout(() => boxes[0]?.focus(), 80);
      startResendCooldown();
    }

    function backToLogin() {
      document.getElementById('verify-step').style.display = 'none';
      document.getElementById('login-form').style.display = '';
      document.getElementById('error-msg').classList.add('hidden');
      _pendingEmail = _pendingUserId = '';
    }

    document.getElementById('digit-row').addEventListener('input', e => {
      if (!e.target.classList.contains('digit-box')) return;
      const v = e.target.value.replace(/\D/g, '');
      e.target.value = v.slice(-1);
      e.target.classList.toggle('filled', !!e.target.value);
      if (e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx < boxes.length - 1) boxes[idx + 1].focus();
        else submitVerification();
      }
    });

    document.getElementById('digit-row').addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx > 0) { boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled'); boxes[idx - 1].focus(); }
      }
    });

    document.getElementById('digit-row').addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      const boxes = [...document.querySelectorAll('.digit-box')];
      text.split('').forEach((ch, i) => { if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); } });
      const next = boxes[text.length] || boxes[boxes.length - 1];
      next.focus();
      if (text.length === 6) submitVerification();
    });

    async function submitVerification() {
      const token = [...document.querySelectorAll('.digit-box')].map(b => b.value).join('');
      if (token.length < 6) return;

      const vBtn     = document.getElementById('verify-btn');
      const vLabel   = document.getElementById('verify-btn-label');
      const vArrow   = document.getElementById('verify-btn-arrow');
      const vSpinner = document.getElementById('verify-btn-spinner');
      const vErr     = document.getElementById('verify-error');

      vBtn.disabled = true;
      vLabel.textContent = 'Verifying…';
      vArrow.classList.add('hidden');
      vSpinner.classList.remove('hidden');
      vErr.classList.add('hidden');

      const { error } = await db.auth.verifyOtp({ email: _pendingEmail, token, type: 'email' });

      vBtn.disabled = false;
      vLabel.textContent = 'Verify Device';
      vArrow.classList.remove('hidden');
      vSpinner.classList.add('hidden');

      if (error) {
        vErr.textContent = error.message.includes('expired') || error.message.includes('invalid')
          ? 'Invalid or expired code. Please try again or resend.'
          : error.message;
        vErr.classList.remove('hidden');
        document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
        document.querySelector('.digit-box')?.focus();
        return;
      }

      await setDeviceTrust(_pendingUserId);
      window.location.replace('admin.html');
    }

    let _resendTimer = null;
    function startResendCooldown() {
      const btn = document.getElementById('resend-btn');
      let s = 60;
      btn.disabled = true;
      btn.textContent = 'Resend in ' + s + 's';
      clearInterval(_resendTimer);
      _resendTimer = setInterval(() => {
        s--;
        if (s <= 0) { clearInterval(_resendTimer); btn.disabled = false; btn.textContent = 'Resend code'; }
        else btn.textContent = 'Resend in ' + s + 's';
      }, 1000);
    }

    async function resendCode() {
      if (!_pendingEmail) return;
      document.getElementById('resend-btn').disabled = true;
      document.getElementById('verify-error').classList.add('hidden');
      await db.auth.signInWithOtp({ email: _pendingEmail, options: { shouldCreateUser: false } });
      startResendCooldown();
      document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
      document.querySelector('.digit-box')?.focus();
    }
  </script>

  <!-- Cursor spotlight: crimson glow + illuminating grid -->
  <script>
    const afsGlow = document.getElementById('afs-glow');
    const afsGrid = document.getElementById('afs-grid');

    function paintAt(x, y) {
      afsGlow.style.background =
        `radial-gradient(700px circle at ${x}px ${y}px, rgba(163,22,33,0.09), transparent 40%)`;
      const mask = `radial-gradient(circle 520px at ${x}px ${y}px, black 0%, transparent 68%)`;
      afsGrid.style.webkitMaskImage = mask;
      afsGrid.style.maskImage       = mask;
    }

    if (window.matchMedia('(pointer: coarse)').matches) {
      (function drift(ts) {
        paintAt(
          window.innerWidth  * (0.5 + 0.35 * Math.sin(ts / 13000 * Math.PI * 2)),
          window.innerHeight * (0.5 + 0.28 * Math.sin(ts / 19000 * Math.PI * 2))
        );
        requestAnimationFrame(drift);
      })(0);
    } else {
      let raf = null, curX = -9999, curY = -9999;
      function paint() { paintAt(curX, curY); raf = null; }
      window.addEventListener('mousemove', e => {
        curX = e.clientX; curY = e.clientY;
        if (!raf) raf = requestAnimationFrame(paint);
      }, { passive: true });
      document.addEventListener('mouseleave', () => {
        curX = -9999; curY = -9999;
        if (!raf) raf = requestAnimationFrame(paint);
      });
    }
  </script>

</body>
</html>
