<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Access — Apex Fiction Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian:        '#0D0D0D',
            charcoal:        '#161616',
            surface:         '#1E1E1E',
            border:          '#2A2A2A',
            crimson:         '#A31621',
            'crimson-light': '#C82333',
            'crimson-dim':   '#7A1019',
            gold:            '#C9A84C',
            muted:           '#6A6A6A',
          },
          fontFamily: {
            sans:  ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .form-input:focus {
      outline: none;
      border-color: #A31621;
      box-shadow: 0 0 0 2px rgba(163,22,33,0.18);
    }
    .digit-box { width:40px; height:48px; text-align:center; font-size:1.25rem; font-weight:700; background:#161616; border:1px solid #2A2A2A; border-radius:8px; color:#fff; transition:border-color .15s, box-shadow .15s; caret-color:#A31621; -moz-appearance:textfield; }
    .digit-box::-webkit-outer-spin-button, .digit-box::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .digit-box:focus { outline:none; border-color:#A31621; box-shadow:0 0 0 2px rgba(163,22,33,0.18); }
    .digit-box.filled { border-color:rgba(163,22,33,0.35); }
    #verify-step { display:none; }

    /* Subtle scanline texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }
  </style>
</head>

<body class="bg-obsidian text-white font-sans antialiased min-h-screen flex items-center justify-center px-4">

  <!-- Crimson radial glow (cursor-tracked) -->
  <div id="afs-glow"
       class="pointer-events-none fixed inset-0"
       style="z-index:0; will-change:background;"></div>

  <!-- Faint grid revealed by cursor (crimson tint) -->
  <div id="afs-grid"
       class="pointer-events-none fixed inset-0"
       style="
         z-index: 0;
         background-image:
           linear-gradient(rgba(163,22,33,0.18) 1px, transparent 1px),
           linear-gradient(90deg, rgba(163,22,33,0.18) 1px, transparent 1px);
         background-size: 48px 48px;
         -webkit-mask-image: radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         mask-image:         radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         will-change: mask-image, -webkit-mask-image;
       "></div>

  <div class="relative z-10 w-full max-w-sm">

    <!-- Logo + wordmark -->
    <div class="flex items-center justify-center gap-3 mb-10">
      <span class="w-8 h-8 rounded-sm bg-crimson flex items-center justify-center text-white font-serif font-bold text-sm">A</span>
      <div class="flex flex-col leading-tight">
        <span class="font-serif text-lg tracking-wide text-white">Apex Fiction Studio</span>
        <span class="text-[10px] font-semibold tracking-[0.22em] uppercase text-crimson-light">Admin Portal</span>
      </div>
    </div>

    <!-- Card -->
    <div class="relative rounded-2xl border border-border bg-surface p-8 shadow-2xl shadow-black/80">

      <!-- Top accent — crimson instead of gold -->
      <div class="absolute top-0 left-8 right-8 h-px bg-gradient-to-r from-transparent via-crimson/60 to-transparent rounded-full"></div>

      <!-- Lock icon -->
      <div class="flex justify-center mb-5">
        <div class="w-10 h-10 rounded-xl bg-crimson/10 border border-crimson/25 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="#A31621" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <h1 class="font-serif text-2xl text-white mb-1 text-center">Admin Access</h1>
      <p class="text-muted text-sm mb-8 text-center">Restricted to authorised personnel only.</p>

      <form id="login-form" class="space-y-5" novalidate>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="email">
            Email Address
          </label>
          <input
            id="email" type="email" autocomplete="email" required
            placeholder="admin@apexfiction.com"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="password">
            Password
          </label>
          <input
            id="password" type="password" autocomplete="current-password" required
            placeholder="••••••••"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <!-- Error / access denied -->
        <div id="error-msg"
             class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5
                       bg-crimson hover:bg-crimson-light text-white
                       text-sm font-semibold rounded-lg
                       transition-colors duration-200
                       disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-label">Access Dashboard</span>
          <svg id="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>

      <!-- DEVICE VERIFICATION STEP -->
      <div id="verify-step">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-crimson/10 border border-crimson/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A31621" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
        </div>

        <h2 class="font-serif text-2xl text-white mb-1 text-center">Verify your device</h2>
        <p class="text-muted text-sm text-center mb-1">We sent a 6-digit code to</p>
        <p id="verify-email-display" class="text-white text-sm font-semibold text-center mb-6 truncate px-2"></p>

        <div id="digit-row" class="flex gap-2 justify-center mb-5">
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
        </div>

        <div id="verify-error" class="hidden mb-4 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed"></div>

        <button id="verify-btn" onclick="submitVerification()"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-crimson hover:bg-crimson-light text-white text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="verify-btn-label">Verify Device</span>
          <svg id="verify-btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg id="verify-btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
        </button>

        <div class="mt-4 flex items-center justify-between">
          <button id="resend-btn" onclick="resendCode()" class="text-xs text-muted hover:text-crimson-light transition-colors">Resend code</button>
          <button onclick="backToLogin()" class="text-xs text-muted hover:text-white transition-colors">Different account</button>
        </div>
      </div>
    </div>

    <!-- Back link -->
    <p class="text-center text-muted text-xs mt-6">
      Not an admin?
      <a href="login.html" class="text-white/50 hover:text-white transition-colors duration-150">
        Writer sign in →
      </a>
    </p>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://qbqsbdswcqmrxoizgfrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_v0fbhx8NkRNxYYVw8VGz_g_7Eqja11K';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, storage: window.localStorage },
    });

    const form    = document.getElementById('login-form');
    const errBox  = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');
    const label   = document.getElementById('btn-label');
    const arrow   = document.getElementById('btn-arrow');
    const spinner = document.getElementById('btn-spinner');

    function setLoading(on) {
      btn.disabled = on;
      label.textContent = on ? 'Verifying…' : 'Access Dashboard';
      arrow.classList.toggle('hidden', on);
      spinner.classList.toggle('hidden', !on);
    }

    function showError(msg) {
      errBox.textContent = msg;
      errBox.classList.remove('hidden');
      setLoading(false);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data: authData, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        return;
      }

      // Verify the account actually has admin rights
      const { data: profile } = await db
        .from('profiles')
        .select('is_admin')
        .eq('id', authData.user.id)
        .single();

      if (!profile?.is_admin) {
        // Sign them back out — they authenticated but aren't an admin
        await db.auth.signOut();
        showError('Access denied. This portal is for authorised admins only.');
        return;
      }

      window.location.replace('admin.html');
    });
  </script>

  <!-- Cursor spotlight: crimson glow + illuminating grid -->
  <script>
    const afsGlow = document.getElementById('afs-glow');
    const afsGrid = document.getElementById('afs-grid');

    function paintAt(x, y) {
      afsGlow.style.background =
        `radial-gradient(700px circle at ${x}px ${y}px, rgba(163,22,33,0.09), transparent 40%)`;
      const mask = `radial-gradient(circle 520px at ${x}px ${y}px, black 0%, transparent 68%)`;
      afsGrid.style.webkitMaskImage = mask;
      afsGrid.style.maskImage       = mask;
    }

    if (window.matchMedia('(pointer: coarse)').matches) {
      (function drift(ts) {
        paintAt(
          window.innerWidth  * (0.5 + 0.35 * Math.sin(ts / 13000 * Math.PI * 2)),
          window.innerHeight * (0.5 + 0.28 * Math.sin(ts / 19000 * Math.PI * 2))
        );
        requestAnimationFrame(drift);
      })(0);
    } else {
      let raf = null, curX = -9999, curY = -9999;
      function paint() { paintAt(curX, curY); raf = null; }
      window.addEventListener('mousemove', e => {
        curX = e.clientX; curY = e.clientY;
        if (!raf) raf = requestAnimationFrame(paint);
      }, { passive: true });
      document.addEventListener('mouseleave', () => {
        curX = -9999; curY = -9999;
        if (!raf) raf = requestAnimationFrame(paint);
      });
    }
  </script>

</body>
</html>
