<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="../assets/afs-favicon.svg"/>
  <title>Sign In — Apex Fiction Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#121212',
            charcoal: '#1C1C1C',
            surface:  '#242424',
            border:   '#2E2E2E',
            gold:     '#C9A84C',
            'gold-light': '#E2C97E',
            muted:    '#7A7A7A',
          },
          fontFamily: {
            sans:  ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400&display=swap" rel="stylesheet"/>
  <style>
    .form-input:focus {
      outline: none;
      border-color: #C9A84C;
      box-shadow: 0 0 0 2px rgba(201,168,76,0.15);
    }
    .digit-box { width:38px; height:46px; text-align:center; font-size:1.15rem; font-weight:700; background:#1C1C1C; border:1px solid #2E2E2E; border-radius:8px; color:#fff; transition:border-color .15s, box-shadow .15s; caret-color:#C9A84C; -moz-appearance:textfield; }
    @media (min-width: 400px) { .digit-box { width:42px; height:50px; font-size:1.25rem; } }
    .digit-box::-webkit-outer-spin-button, .digit-box::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .digit-box:focus { outline:none; border-color:#C9A84C; box-shadow:0 0 0 2px rgba(201,168,76,0.15); }
    .digit-box.filled { border-color:rgba(201,168,76,0.4); }
    #verify-step { display:none; }
  </style>
</head>
<body class="bg-obsidian text-white font-sans antialiased min-h-screen flex items-center justify-center px-4">
  <!-- Layer 1: soft gold radial glow that follows the cursor -->
  <div id="afs-glow"
       class="pointer-events-none fixed inset-0"
       style="z-index:0; will-change:background;"></div>

  <!-- Layer 2: faint gold grid, fully masked by default, revealed by cursor -->
  <div id="afs-grid"
       class="pointer-events-none fixed inset-0"
       style="
         z-index: 0;
         background-image:
           linear-gradient(rgba(201,168,76,0.13) 1px, transparent 1px),
           linear-gradient(90deg, rgba(201,168,76,0.13) 1px, transparent 1px);
         background-size: 48px 48px;
         -webkit-mask-image: radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         mask-image:         radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         will-change: mask-image, -webkit-mask-image;
       "></div>

  <div class="relative z-10 w-full max-w-sm mx-auto">

    <!-- Logo -->
    <div class="flex items-center justify-center mb-10">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="15 18 110 52" height="54" style="clip-path:path('M0 0 H200 V21 H0 Z M0 26 H200 V54 H0 Z')" aria-label="AFS Publishing">
        <g transform="translate(20,15)">
          <text class="afs-logo-main" font-family="'Cinzel',Georgia,serif" font-weight="400" fill="#EEECE9" font-size="38" letter-spacing="4" x="0" y="35">AFS</text>
          
          <text class="afs-logo-sub" font-family="'Montserrat',system-ui,sans-serif" font-weight="400" fill="rgba(238,236,233,0.45)" font-size="9" letter-spacing="5" x="2" y="52">Publishing</text>
        </g>
      </svg>
    </div>

    <!-- Card -->
    <div class="relative rounded-2xl border border-border bg-surface p-6 sm:p-8 shadow-2xl shadow-black/60">
      <!-- Top accent -->
      <div class="absolute top-0 left-8 right-8 h-px bg-gradient-to-r from-transparent via-gold to-transparent opacity-40 rounded-full"></div>

      <h1 class="font-serif text-2xl text-white mb-1">Writer Sign In</h1>
      <p class="text-muted text-sm mb-8">Access your private earnings dashboard.</p>

      <form id="login-form" class="space-y-5" novalidate>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="email">
            Email Address
          </label>
          <input
            id="email" type="email" autocomplete="email" required
            placeholder="you@email.com"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <input
              id="password" type="password" autocomplete="current-password" required
              placeholder="••••••••"
              class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 pr-11 transition-all duration-200"/>
            <button type="button" onclick="togglePw('password', this)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-muted/50 hover:text-muted transition-colors p-1"
                    tabindex="-1" aria-label="Toggle password visibility">
              <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div id="error-msg"
             class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5
                       bg-gold hover:bg-gold-light text-obsidian
                       text-sm font-semibold rounded-lg
                       transition-colors duration-200
                       disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-label">Sign In to Dashboard</span>
          <svg id="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          <!-- Spinner (hidden by default) -->
          <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

        <div class="text-right mt-2">
          <button type="button" onclick="showForgotStep()"
                  class="text-xs text-muted hover:text-gold transition-colors duration-150">
            Forgot your password?
          </button>
        </div>
      </form>

      <!-- FORGOT PASSWORD STEP -->
      <div id="forgot-step" style="display:none;">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-gold/10 border border-gold/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
        </div>
        <h2 id="forgot-title" class="font-serif text-2xl text-white mb-1 text-center">Reset Password</h2>
        <p id="forgot-subtitle" class="text-muted text-sm text-center mb-6">Enter your email and we'll send a reset link.</p>
        <div class="space-y-4">
          <input id="forgot-email" type="email" autocomplete="email" placeholder="you@email.com"
                 class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
          <div id="forgot-error" class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3"></div>
          <div id="forgot-success" class="hidden text-xs text-green-400 bg-green-400/10 border border-green-400/20 rounded-lg px-4 py-3 leading-relaxed"></div>
          <button id="forgot-btn" onclick="sendResetEmail()"
                  class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-gold hover:bg-gold-light text-obsidian text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="forgot-btn-label">Send Reset Link</span>
            <svg id="forgot-btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
          </button>
          <div class="text-center">
            <button onclick="backToLogin()" class="text-xs text-muted hover:text-white transition-colors">Back to sign in</button>
          </div>
        </div>
      </div>

      <!-- SET NEW PASSWORD STEP (arrives from invite or reset email) -->
      <div id="set-password-step" style="display:none;">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-gold/10 border border-gold/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>
        <h2 class="font-serif text-2xl text-white mb-1 text-center">Set Your Password</h2>
        <p class="text-muted text-sm text-center mb-6">Choose a strong password to secure your account.</p>
        <div class="space-y-4">
          <div class="relative">
            <input id="new-password" type="password" autocomplete="new-password" placeholder="New password"
                   class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 pr-11 transition-all duration-200"/>
            <button type="button" onclick="togglePw('new-password', this)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-muted/50 hover:text-muted transition-colors p-1"
                    tabindex="-1" aria-label="Toggle password visibility">
              <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div class="relative">
            <input id="confirm-password" type="password" autocomplete="new-password" placeholder="Confirm password"
                   class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 pr-11 transition-all duration-200"/>
            <button type="button" onclick="togglePw('confirm-password', this)"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-muted/50 hover:text-muted transition-colors p-1"
                    tabindex="-1" aria-label="Toggle password visibility">
              <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <div id="set-pw-error" class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3"></div>
          <button id="set-pw-btn" onclick="submitNewPassword()"
                  class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-gold hover:bg-gold-light text-obsidian text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="set-pw-label">Set Password &amp; Sign In</span>
            <svg id="set-pw-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
          </button>
        </div>
      </div>

      <!-- DEVICE VERIFICATION STEP -->
      <div id="verify-step">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-gold/10 border border-gold/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
        </div>

        <h2 class="font-serif text-2xl text-white mb-1 text-center">Verify your device</h2>
        <p class="text-muted text-sm text-center mb-1">We sent a 6-digit code to</p>
        <p id="verify-email-display" class="text-white text-sm font-semibold text-center mb-6 truncate px-2"></p>

        <div id="digit-row" class="flex gap-2 justify-center mb-5">
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
        </div>

        <div id="verify-error" class="hidden mb-4 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed"></div>

        <button id="verify-btn" onclick="submitVerification()"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-gold hover:bg-gold-light text-obsidian text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="verify-btn-label">Verify Device</span>
          <svg id="verify-btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg id="verify-btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
        </button>

        <div class="mt-4 flex items-center justify-between">
          <button id="resend-btn" onclick="resendCode()" class="text-xs text-muted hover:text-gold transition-colors">Resend code</button>
          <button onclick="backToLogin()" class="text-xs text-muted hover:text-white transition-colors">Different account</button>
        </div>
      </div>
    </div>

    <p class="text-center text-muted text-xs mt-6">
      Not a member yet?
      <a href="../index.html#apply" class="text-gold hover:text-gold-light transition-colors duration-150">
        Apply to the Collective →
      </a>
    </p>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://qbqsbdswcqmrxoizgfrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_v0fbhx8NkRNxYYVw8VGz_g_7Eqja11K';

    // Capture URL params BEFORE createClient so Supabase can't clean them first.
    // Supabase emails use implicit flow (#access_token=...) so we must read hash now.
    const _hashParams     = new URLSearchParams(window.location.hash.slice(1));
    const _linkType       = _hashParams.get('type');          // 'invite' | 'recovery' | null
    const _hashToken      = _hashParams.get('access_token');  // present in implicit-flow links
    const _urlCode        = new URLSearchParams(window.location.search).has('code'); // PKCE links
    const _isAuthRedirect = _urlCode || !!_hashToken || _linkType === 'recovery' || _linkType === 'invite';
    // Expired / already-consumed link: Supabase redirects here with an error
    // (e.g. #error=access_denied&error_code=otp_expired) instead of tokens.
    const _qsParams       = new URLSearchParams(window.location.search);
    const _authError      = _hashParams.get('error_code') || _hashParams.get('error') || _qsParams.get('error_code') || _qsParams.get('error');

    const { createClient } = supabase;
    // Use implicit flow — Supabase emails embed tokens in the URL hash (#access_token=...).
    // PKCE flow ignores hash tokens and would never detect the session.
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, storage: window.localStorage, flowType: 'implicit' },
    });

    const TRUST_PREFIX = 'afs_dev_';
    const TRUST_MS     = 30 * 24 * 60 * 60 * 1000; // 30 days

    async function getDeviceTrust(userId) {
      try {
        const stored = JSON.parse(localStorage.getItem(TRUST_PREFIX + userId) || 'null');
        if (!stored?.token) return false;
        const { data } = await db.from('device_tokens')
          .select('id')
          .eq('user_id', userId)
          .eq('token', stored.token)
          .gte('expires_at', new Date().toISOString())
          .maybeSingle();
        return !!data;
      } catch { return false; }
    }

    async function setDeviceTrust(userId) {
      try {
        const arr   = crypto.getRandomValues(new Uint8Array(32));
        const token = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
        const expiresAt = new Date(Date.now() + TRUST_MS).toISOString();
        // Clean expired tokens for this user, then insert new one
        await db.from('device_tokens').delete()
          .eq('user_id', userId).lt('expires_at', new Date().toISOString());
        await db.from('device_tokens').insert({ user_id: userId, token, expires_at: expiresAt });
        localStorage.setItem(TRUST_PREFIX + userId, JSON.stringify({ token }));
      } catch { /* non-fatal — user still authenticated via OTP */ }
    }

    // ── Login form ────────────────────────────────────────────────
    const form    = document.getElementById('login-form');
    const errBox  = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');
    const label   = document.getElementById('btn-label');
    const arrow   = document.getElementById('btn-arrow');
    const spinner = document.getElementById('btn-spinner');

    let _pendingEmail  = '';
    let _pendingUserId = '';

    function setLoading(on) {
      btn.disabled = on;
      label.textContent = on ? 'Signing in…' : 'Sign In to Dashboard';
      arrow.classList.toggle('hidden', on);
      spinner.classList.toggle('hidden', !on);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errBox.textContent = error.message;
        errBox.classList.remove('hidden');
        setLoading(false);
        return;
      }

      const userId = data.user?.id;

      // Trusted device? Go straight to dashboard
      if (await getDeviceTrust(userId)) {
        window.location.replace('index.html');
        return;
      }

      // New / untrusted device — sign out and send OTP
      _pendingEmail  = email;
      _pendingUserId = userId;

      await db.auth.signOut();

      const { error: otpErr } = await db.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false },
      });

      setLoading(false);

      if (otpErr) {
        errBox.textContent = 'Could not send verification code: ' + otpErr.message;
        errBox.classList.remove('hidden');
        return;
      }

      showVerifyStep();
    });

    // ── Verification step ─────────────────────────────────────────
    function showVerifyStep() {
      document.getElementById('login-form').style.display = 'none';
      const step = document.getElementById('verify-step');
      step.style.display = 'block';
      document.getElementById('verify-email-display').textContent = _pendingEmail;
      document.getElementById('verify-error').classList.add('hidden');
      const boxes = document.querySelectorAll('.digit-box');
      boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
      setTimeout(() => boxes[0]?.focus(), 80);
      startResendCooldown();
    }

    function _hideAllSteps() {
      ['login-form','verify-step','forgot-step','set-password-step'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
    }

    function backToLogin() {
      _hideAllSteps();
      document.getElementById('login-form').style.display = '';
      document.getElementById('error-msg').classList.add('hidden');
      _pendingEmail = _pendingUserId = '';
    }

    function showForgotStep() {
      _hideAllSteps();
      document.getElementById('forgot-step').style.display = 'block';
      document.getElementById('forgot-title').textContent = 'Reset Password';
      document.getElementById('forgot-subtitle').textContent = "Enter your email and we'll send a reset link.";
      document.getElementById('forgot-error').classList.add('hidden');
      document.getElementById('forgot-success').classList.add('hidden');
      setTimeout(() => document.getElementById('forgot-email')?.focus(), 80);
    }

    // Expired or already-used sign-in/invite link → guide the user to get a fresh one.
    function showLinkExpired() {
      _hideAllSteps();
      document.getElementById('forgot-step').style.display = 'block';
      document.getElementById('forgot-title').textContent = 'Link Expired';
      document.getElementById('forgot-subtitle').textContent =
        "That sign-in link has expired or was already used. Enter your email and we'll send you a fresh link to set your password.";
      document.getElementById('forgot-error').classList.add('hidden');
      document.getElementById('forgot-success').classList.add('hidden');
      setTimeout(() => document.getElementById('forgot-email')?.focus(), 80);
    }

    async function sendResetEmail() {
      const email  = document.getElementById('forgot-email').value.trim();
      const errBox = document.getElementById('forgot-error');
      const okBox  = document.getElementById('forgot-success');
      const btn    = document.getElementById('forgot-btn');
      const lbl    = document.getElementById('forgot-btn-label');
      const spin   = document.getElementById('forgot-btn-spinner');

      errBox.classList.add('hidden');
      okBox.classList.add('hidden');
      if (!email) { errBox.textContent = 'Please enter your email.'; errBox.classList.remove('hidden'); return; }

      btn.disabled = true;
      lbl.textContent = 'Sending…';
      spin.classList.remove('hidden');

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname,
      });

      btn.disabled = false;
      lbl.textContent = 'Send Reset Link';
      spin.classList.add('hidden');

      if (error) {
        errBox.textContent = error.message;
        errBox.classList.remove('hidden');
      } else {
        okBox.textContent = 'Check your inbox — a reset link is on its way.';
        okBox.classList.remove('hidden');
      }
    }

    function showSetPasswordStep() {
      _hideAllSteps();
      document.getElementById('set-password-step').style.display = 'block';
      setTimeout(() => document.getElementById('new-password')?.focus(), 80);
    }

    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.querySelector('.eye-show').classList.toggle('hidden', show);
      btn.querySelector('.eye-hide').classList.toggle('hidden', !show);
    }

    async function submitNewPassword() {
      const pw1    = document.getElementById('new-password').value;
      const pw2    = document.getElementById('confirm-password').value;
      const errBox = document.getElementById('set-pw-error');
      const btn    = document.getElementById('set-pw-btn');
      const lbl    = document.getElementById('set-pw-label');
      const spin   = document.getElementById('set-pw-spinner');

      errBox.classList.add('hidden');
      if (pw1.length < 8) { errBox.textContent = 'Password must be at least 8 characters.'; errBox.classList.remove('hidden'); return; }
      if (pw1 !== pw2)    { errBox.textContent = 'Passwords do not match.'; errBox.classList.remove('hidden'); return; }

      btn.disabled = true;
      lbl.textContent = 'Saving…';
      spin.classList.remove('hidden');

      const { error } = await db.auth.updateUser({ password: pw1 });

      btn.disabled = false;
      lbl.textContent = 'Set Password & Sign In';
      spin.classList.add('hidden');

      if (error) {
        errBox.textContent = error.message;
        errBox.classList.remove('hidden');
      } else {
        window.location.replace('index.html');
      }
    }

    // Auth redirect handler.
    // Implicit flow fires PASSWORD_RECOVERY for reset links, SIGNED_IN for invites.
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showSetPasswordStep(); return;
      }
      if (_isAuthRedirect && session && event === 'SIGNED_IN') {
        showSetPasswordStep(); return;
      }
    });

    // Immediate fallback: implicit-flow client reads hash tokens synchronously on
    // init, so by the time we reach here the session may already exist.
    (async () => {
      if (!_isAuthRedirect) return;
      const { data: { session } } = await db.auth.getSession();
      if (session) showSetPasswordStep();
    })();

    // If we arrived with an auth error (expired/consumed link), guide recovery.
    if (_authError && !_isAuthRedirect) showLinkExpired();

    // Digit-box auto-advance + backspace
    document.getElementById('digit-row').addEventListener('input', e => {
      if (!e.target.classList.contains('digit-box')) return;
      const v = e.target.value.replace(/\D/g, '');
      e.target.value = v.slice(-1);
      e.target.classList.toggle('filled', !!e.target.value);
      if (e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx < boxes.length - 1) boxes[idx + 1].focus();
        else submitVerification();
      }
    });

    document.getElementById('digit-row').addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx > 0) { boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled'); boxes[idx - 1].focus(); }
      }
    });

    // Handle paste of full code
    document.getElementById('digit-row').addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      const boxes = [...document.querySelectorAll('.digit-box')];
      text.split('').forEach((ch, i) => { if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); } });
      const next = boxes[text.length] || boxes[boxes.length - 1];
      next.focus();
      if (text.length === 6) submitVerification();
    });

    async function submitVerification() {
      const token = [...document.querySelectorAll('.digit-box')].map(b => b.value).join('');
      if (token.length < 6) return;

      const vBtn     = document.getElementById('verify-btn');
      const vLabel   = document.getElementById('verify-btn-label');
      const vArrow   = document.getElementById('verify-btn-arrow');
      const vSpinner = document.getElementById('verify-btn-spinner');
      const vErr     = document.getElementById('verify-error');

      vBtn.disabled = true;
      vLabel.textContent = 'Verifying…';
      vArrow.classList.add('hidden');
      vSpinner.classList.remove('hidden');
      vErr.classList.add('hidden');

      const { error } = await db.auth.verifyOtp({ email: _pendingEmail, token, type: 'email' });

      vBtn.disabled = false;
      vLabel.textContent = 'Verify Device';
      vArrow.classList.remove('hidden');
      vSpinner.classList.add('hidden');

      if (error) {
        vErr.textContent = error.message.includes('expired') || error.message.includes('invalid')
          ? 'Invalid or expired code. Please try again or resend.'
          : error.message;
        vErr.classList.remove('hidden');
        document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
        document.querySelector('.digit-box')?.focus();
        return;
      }

      await setDeviceTrust(_pendingUserId);
      window.location.replace('index.html');
    }

    // Resend code with 60s cooldown
    let _resendTimer = null;
    function startResendCooldown() {
      const btn = document.getElementById('resend-btn');
      let s = 60;
      btn.disabled = true;
      btn.textContent = 'Resend in ' + s + 's';
      clearInterval(_resendTimer);
      _resendTimer = setInterval(() => {
        s--;
        if (s <= 0) { clearInterval(_resendTimer); btn.disabled = false; btn.textContent = 'Resend code'; }
        else btn.textContent = 'Resend in ' + s + 's';
      }, 1000);
    }

    async function resendCode() {
      if (!_pendingEmail) return;
      document.getElementById('resend-btn').disabled = true;
      document.getElementById('verify-error').classList.add('hidden');
      await db.auth.signInWithOtp({ email: _pendingEmail, options: { shouldCreateUser: false } });
      startResendCooldown();
      document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
      document.querySelector('.digit-box')?.focus();
    }
  </script>

  <!-- Cursor spotlight: gold glow + illuminating grid -->
  <script>
    const afsGlow = document.getElementById('afs-glow');
    const afsGrid = document.getElementById('afs-grid');

    function paintAt(x, y) {
      afsGlow.style.background =
        `radial-gradient(700px circle at ${x}px ${y}px, rgba(212,175,55,0.07), transparent 40%)`;
      const mask = `radial-gradient(circle 520px at ${x}px ${y}px, black 0%, transparent 68%)`;
      afsGrid.style.webkitMaskImage = mask;
      afsGrid.style.maskImage       = mask;
    }

    if (window.matchMedia('(pointer: coarse)').matches) {
      (function drift(ts) {
        paintAt(
          window.innerWidth  * (0.5 + 0.35 * Math.sin(ts / 13000 * Math.PI * 2)),
          window.innerHeight * (0.5 + 0.28 * Math.sin(ts / 19000 * Math.PI * 2))
        );
        requestAnimationFrame(drift);
      })(0);
    } else {
      let raf = null, curX = -9999, curY = -9999;
      function paint() { paintAt(curX, curY); raf = null; }
      window.addEventListener('mousemove', e => {
        curX = e.clientX; curY = e.clientY;
        if (!raf) raf = requestAnimationFrame(paint);
      }, { passive: true });
      document.addEventListener('mouseleave', () => {
        curX = -9999; curY = -9999;
        if (!raf) raf = requestAnimationFrame(paint);
      });
    }
  
</script>
