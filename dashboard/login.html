<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Apex Fiction Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidian: '#121212',
            charcoal: '#1C1C1C',
            surface:  '#242424',
            border:   '#2E2E2E',
            gold:     '#C9A84C',
            'gold-light': '#E2C97E',
            muted:    '#7A7A7A',
          },
          fontFamily: {
            sans:  ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"DM Serif Display"', 'Georgia', 'serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    .form-input:focus {
      outline: none;
      border-color: #C9A84C;
      box-shadow: 0 0 0 2px rgba(201,168,76,0.15);
    }
    .digit-box { width:38px; height:46px; text-align:center; font-size:1.15rem; font-weight:700; background:#1C1C1C; border:1px solid #2E2E2E; border-radius:8px; color:#fff; transition:border-color .15s, box-shadow .15s; caret-color:#C9A84C; -moz-appearance:textfield; }
    @media (min-width: 400px) { .digit-box { width:42px; height:50px; font-size:1.25rem; } }
    .digit-box::-webkit-outer-spin-button, .digit-box::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .digit-box:focus { outline:none; border-color:#C9A84C; box-shadow:0 0 0 2px rgba(201,168,76,0.15); }
    .digit-box.filled { border-color:rgba(201,168,76,0.4); }
    #verify-step { display:none; }
  </style>
</head>
<body class="bg-obsidian text-white font-sans antialiased min-h-screen flex items-center justify-center px-4">

  <!-- Layer 1: soft gold radial glow that follows the cursor -->
  <div id="afs-glow"
       class="pointer-events-none fixed inset-0"
       style="z-index:0; will-change:background;"></div>

  <!-- Layer 2: faint gold grid, fully masked by default, revealed by cursor -->
  <div id="afs-grid"
       class="pointer-events-none fixed inset-0"
       style="
         z-index: 0;
         background-image:
           linear-gradient(rgba(201,168,76,0.13) 1px, transparent 1px),
           linear-gradient(90deg, rgba(201,168,76,0.13) 1px, transparent 1px);
         background-size: 48px 48px;
         -webkit-mask-image: radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         mask-image:         radial-gradient(circle 520px at -9999px -9999px, black 0%, transparent 70%);
         will-change: mask-image, -webkit-mask-image;
       "></div>

  <div class="relative z-10 w-full max-w-sm mx-auto">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-10">
      <span class="w-8 h-8 rounded-sm bg-gold flex items-center justify-center text-obsidian font-serif font-bold">A</span>
      <span class="font-serif text-xl tracking-wide text-white">Apex Fiction Studio</span>
    </div>

    <!-- Card -->
    <div class="relative rounded-2xl border border-border bg-surface p-6 sm:p-8 shadow-2xl shadow-black/60">
      <!-- Top accent -->
      <div class="absolute top-0 left-8 right-8 h-px bg-gradient-to-r from-transparent via-gold to-transparent opacity-40 rounded-full"></div>

      <h1 class="font-serif text-2xl text-white mb-1">Writer Sign In</h1>
      <p class="text-muted text-sm mb-8">Access your private earnings dashboard.</p>

      <form id="login-form" class="space-y-5" novalidate>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="email">
            Email Address
          </label>
          <input
            id="email" type="email" autocomplete="email" required
            placeholder="you@email.com"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <div>
          <label class="block text-xs font-medium text-white/70 tracking-wide mb-2" for="password">
            Password
          </label>
          <input
            id="password" type="password" autocomplete="current-password" required
            placeholder="••••••••"
            class="form-input w-full bg-charcoal border border-border text-white placeholder-muted text-sm rounded-lg px-4 py-3 transition-all duration-200"/>
        </div>

        <!-- Error -->
        <div id="error-msg"
             class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed">
        </div>

        <button type="submit" id="submit-btn"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5
                       bg-gold hover:bg-gold-light text-obsidian
                       text-sm font-semibold rounded-lg
                       transition-colors duration-200
                       disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="btn-label">Sign In to Dashboard</span>
          <svg id="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
          <!-- Spinner (hidden by default) -->
          <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </button>

      </form>

      <!-- DEVICE VERIFICATION STEP -->
      <div id="verify-step">
        <div class="flex justify-center mb-5">
          <div class="w-10 h-10 rounded-xl bg-gold/10 border border-gold/25 flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
        </div>

        <h2 class="font-serif text-2xl text-white mb-1 text-center">Verify your device</h2>
        <p class="text-muted text-sm text-center mb-1">We sent a 6-digit code to</p>
        <p id="verify-email-display" class="text-white text-sm font-semibold text-center mb-6 truncate px-2"></p>

        <div id="digit-row" class="flex gap-2 justify-center mb-5">
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
          <input class="digit-box" type="text" inputmode="numeric" maxlength="1"/>
        </div>

        <div id="verify-error" class="hidden mb-4 text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-4 py-3 leading-relaxed"></div>

        <button id="verify-btn" onclick="submitVerification()"
                class="w-full flex items-center justify-center gap-2 px-6 py-3.5 bg-gold hover:bg-gold-light text-obsidian text-sm font-semibold rounded-lg transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
          <span id="verify-btn-label">Verify Device</span>
          <svg id="verify-btn-arrow" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          <svg id="verify-btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg>
        </button>

        <div class="mt-4 flex items-center justify-between">
          <button id="resend-btn" onclick="resendCode()" class="text-xs text-muted hover:text-gold transition-colors">Resend code</button>
          <button onclick="backToLogin()" class="text-xs text-muted hover:text-white transition-colors">Different account</button>
        </div>
      </div>
    </div>

    <p class="text-center text-muted text-xs mt-6">
      Not a member yet?
      <a href="../index.html#apply" class="text-gold hover:text-gold-light transition-colors duration-150">
        Apply to the Collective →
      </a>
    </p>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://qbqsbdswcqmrxoizgfrw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_v0fbhx8NkRNxYYVw8VGz_g_7Eqja11K';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, storage: window.localStorage },
    });

    const TRUST_PREFIX = 'afs_dev_';
    const TRUST_MS     = 30 * 24 * 60 * 60 * 1000; // 30 days

    function getDeviceTrust(userId) {
      try {
        const v = JSON.parse(localStorage.getItem(TRUST_PREFIX + userId) || 'null');
        return v && (Date.now() - v.at < TRUST_MS);
      } catch { return false; }
    }
    function setDeviceTrust(userId) {
      localStorage.setItem(TRUST_PREFIX + userId, JSON.stringify({ at: Date.now() }));
    }

    // ── Login form ────────────────────────────────────────────────
    const form    = document.getElementById('login-form');
    const errBox  = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');
    const label   = document.getElementById('btn-label');
    const arrow   = document.getElementById('btn-arrow');
    const spinner = document.getElementById('btn-spinner');

    let _pendingEmail  = '';
    let _pendingUserId = '';

    function setLoading(on) {
      btn.disabled = on;
      label.textContent = on ? 'Signing in…' : 'Sign In to Dashboard';
      arrow.classList.toggle('hidden', on);
      spinner.classList.toggle('hidden', !on);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      setLoading(true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        errBox.textContent = error.message;
        errBox.classList.remove('hidden');
        setLoading(false);
        return;
      }

      const userId = data.user?.id;

      // Trusted device? Go straight to dashboard
      if (getDeviceTrust(userId)) {
        window.location.replace('index.html');
        return;
      }

      // New / untrusted device — sign out and send OTP
      _pendingEmail  = email;
      _pendingUserId = userId;

      await db.auth.signOut();

      const { error: otpErr } = await db.auth.signInWithOtp({
        email,
        options: { shouldCreateUser: false },
      });

      setLoading(false);

      if (otpErr) {
        errBox.textContent = 'Could not send verification code: ' + otpErr.message;
        errBox.classList.remove('hidden');
        return;
      }

      showVerifyStep();
    });

    // ── Verification step ─────────────────────────────────────────
    function showVerifyStep() {
      document.getElementById('login-form').style.display = 'none';
      const step = document.getElementById('verify-step');
      step.style.display = 'block';
      document.getElementById('verify-email-display').textContent = _pendingEmail;
      document.getElementById('verify-error').classList.add('hidden');
      const boxes = document.querySelectorAll('.digit-box');
      boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
      setTimeout(() => boxes[0]?.focus(), 80);
      startResendCooldown();
    }

    function backToLogin() {
      document.getElementById('verify-step').style.display = 'none';
      document.getElementById('login-form').style.display = '';
      document.getElementById('error-msg').classList.add('hidden');
      _pendingEmail = _pendingUserId = '';
    }

    // Digit-box auto-advance + backspace
    document.getElementById('digit-row').addEventListener('input', e => {
      if (!e.target.classList.contains('digit-box')) return;
      const v = e.target.value.replace(/\D/g, '');
      e.target.value = v.slice(-1);
      e.target.classList.toggle('filled', !!e.target.value);
      if (e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx < boxes.length - 1) boxes[idx + 1].focus();
        else submitVerification();
      }
    });

    document.getElementById('digit-row').addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !e.target.value) {
        const boxes = [...document.querySelectorAll('.digit-box')];
        const idx = boxes.indexOf(e.target);
        if (idx > 0) { boxes[idx - 1].value = ''; boxes[idx - 1].classList.remove('filled'); boxes[idx - 1].focus(); }
      }
    });

    // Handle paste of full code
    document.getElementById('digit-row').addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      const boxes = [...document.querySelectorAll('.digit-box')];
      text.split('').forEach((ch, i) => { if (boxes[i]) { boxes[i].value = ch; boxes[i].classList.add('filled'); } });
      const next = boxes[text.length] || boxes[boxes.length - 1];
      next.focus();
      if (text.length === 6) submitVerification();
    });

    async function submitVerification() {
      const token = [...document.querySelectorAll('.digit-box')].map(b => b.value).join('');
      if (token.length < 6) return;

      const vBtn     = document.getElementById('verify-btn');
      const vLabel   = document.getElementById('verify-btn-label');
      const vArrow   = document.getElementById('verify-btn-arrow');
      const vSpinner = document.getElementById('verify-btn-spinner');
      const vErr     = document.getElementById('verify-error');

      vBtn.disabled = true;
      vLabel.textContent = 'Verifying…';
      vArrow.classList.add('hidden');
      vSpinner.classList.remove('hidden');
      vErr.classList.add('hidden');

      const { error } = await db.auth.verifyOtp({ email: _pendingEmail, token, type: 'email' });

      vBtn.disabled = false;
      vLabel.textContent = 'Verify Device';
      vArrow.classList.remove('hidden');
      vSpinner.classList.add('hidden');

      if (error) {
        vErr.textContent = error.message.includes('expired') || error.message.includes('invalid')
          ? 'Invalid or expired code. Please try again or resend.'
          : error.message;
        vErr.classList.remove('hidden');
        document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
        document.querySelector('.digit-box')?.focus();
        return;
      }

      setDeviceTrust(_pendingUserId);
      window.location.replace('index.html');
    }

    // Resend code with 60s cooldown
    let _resendTimer = null;
    function startResendCooldown() {
      const btn = document.getElementById('resend-btn');
      let s = 60;
      btn.disabled = true;
      btn.textContent = 'Resend in ' + s + 's';
      clearInterval(_resendTimer);
      _resendTimer = setInterval(() => {
        s--;
        if (s <= 0) { clearInterval(_resendTimer); btn.disabled = false; btn.textContent = 'Resend code'; }
        else btn.textContent = 'Resend in ' + s + 's';
      }, 1000);
    }

    async function resendCode() {
      if (!_pendingEmail) return;
      document.getElementById('resend-btn').disabled = true;
      document.getElementById('verify-error').classList.add('hidden');
      await db.auth.signInWithOtp({ email: _pendingEmail, options: { shouldCreateUser: false } });
      startResendCooldown();
      document.querySelectorAll('.digit-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
      document.querySelector('.digit-box')?.focus();
    }
  </script>

  <!-- Cursor spotlight: gold glow + illuminating grid -->
  <script>
    const afsGlow = document.getElementById('afs-glow');
    const afsGrid = document.getElementById('afs-grid');

    function paintAt(x, y) {
      afsGlow.style.background =
        `radial-gradient(700px circle at ${x}px ${y}px, rgba(212,175,55,0.07), transparent 40%)`;
      const mask = `radial-gradient(circle 520px at ${x}px ${y}px, black 0%, transparent 68%)`;
      afsGrid.style.webkitMaskImage = mask;
      afsGrid.style.maskImage       = mask;
    }

    if (window.matchMedia('(pointer: coarse)').matches) {
      (function drift(ts) {
        paintAt(
          window.innerWidth  * (0.5 + 0.35 * Math.sin(ts / 13000 * Math.PI * 2)),
          window.innerHeight * (0.5 + 0.28 * Math.sin(ts / 19000 * Math.PI * 2))
        );
        requestAnimationFrame(drift);
      })(0);
    } else {
      let raf = null, curX = -9999, curY = -9999;
      function paint() { paintAt(curX, curY); raf = null; }
      window.addEventListener('mousemove', e => {
        curX = e.clientX; curY = e.clientY;
        if (!raf) raf = requestAnimationFrame(paint);
      }, { passive: true });
      document.addEventListener('mouseleave', () => {
        curX = -9999; curY = -9999;
        if (!raf) raf = requestAnimationFrame(paint);
      });
    }
  </script>

</body>
</html>
